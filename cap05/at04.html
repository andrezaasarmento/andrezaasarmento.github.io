<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>PWEB1 — Cap. 05 — AT04 — Inscrição em Evento</title>

</head>

<body>

    <header>

        <h1>Semana de Tecnologia IFAL</h1>

        <p>
            <a href="stividade5.html">
                ← Voltar para a página principal
            </a>
        </p>

    </header>

    <main>

        <form
            action="https://httpbin.org/post"
            method="post"
            enctype="multipart/form-data">

            <fieldset>

                <legend>Identificação do participante</legend>

                <p>

                    <label for="nome">
                        Nome completo
                    </label>

                    <input
                        type="text"
                        id="nome"
                        name="nome"
                        required>

                </p>

                <p>

                    <label for="email">
                        E-mail institucional
                    </label>

                    <input
                        type="email"
                        id="email"
                        name="email"
                        required>

                </p>

                <p>

                    <label for="cidade">
                        Cidade de origem
                    </label>

                    <input
                        type="text"
                        id="cidade"
                        name="cidade"
                        list="cidades">

                    <datalist id="cidades">

                        <option value="Maceió">
                        <option value="Arapiraca">
                        <option value="Palmeira dos Índios">
                        <option value="Rio Largo">
                        <option value="União dos Palmares">
                        <option value="Penedo">
                        <option value="Delmiro Gouveia">
                        <option value="São Miguel dos Campos">

                    </datalist>

                </p>

                <p>

                    <label for="foto">
                        Foto para crachá
                    </label>

                    <input
                        type="file"
                        id="foto"
                        name="foto"
                        accept="image/jpeg,image/png"
                        aria-describedby="ajuda-foto">

                    <small id="ajuda-foto">
                        Formatos aceitos: JPG e PNG. Tamanho máximo: 2 MB.
                    </small>

                </p>

            </fieldset>

            <fieldset>

                <legend>Preferências para o evento</legend>

                <p>

                    <label for="chegada">
                        Data e hora preferida para chegada
                    </label>

                    <input
                        type="datetime-local"
                        id="chegada"
                        name="chegada">

                </p>

                <p>

                    <label for="experiencia">
                        Nível de experiência:
                        <span id="valor-experiencia">
                            5
                        </span>/10
                    </label>

                    <input
                        type="range"
                        id="experiencia"
                        name="experiencia"
                        min="0"
                        max="10"
                        step="1"
                        value="5"
                        oninput="document.getElementById('valor-experiencia').textContent = this.value">

                </p>

                <p>

                    <label for="cor_camiseta">
                        Cor de preferência para a camiseta
                    </label>

                    <input
                        type="color"
                        id="cor_camiseta"
                        name="cor_camiseta"
                        value="#1a73e8">

                </p>

                <p>

                    <label for="oficinas">
                        Oficinas de interesse
                    </label>

                    <select
                        id="oficinas"
                        name="oficinas[]"
                        multiple
                        size="4"
                        aria-describedby="ajuda-oficinas">

                        <option>
                            Desenvolvimento Web
                        </option>

                        <option>
                            Banco de Dados
                        </option>

                        <option>
                            Inteligência Artificial
                        </option>

                        <option>
                            Segurança da Informação
                        </option>

                        <option>
                            Infraestrutura
                        </option>

                    </select>

                    <small id="ajuda-oficinas">
                        Use Ctrl (ou Cmd no Mac) para selecionar mais de uma oficina.
                    </small>

                </p>

            </fieldset>

            <input
                type="hidden"
                name="edicao"
                value="2026">

            <button type="submit">
                Confirmar inscrição
            </button>

        </form>

    </main>

</body>

</html>
